<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký</title>
    <link rel="stylesheet" href="./assets/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div id="header"></div>
    <main class="register-page">
        <section class="register-shell">
            <div class="register-card">
                <h1 class="register-title text-26 text-medium">ĐĂNG KÝ</h1>
                <div class="register-title-divider" aria-hidden="true">
                    <span></span>
                </div>

                <p class="register-hint text-16 text-regular">
                    Đã có tài khoản, đăng nhập <a href="./login.html">tại đây</a>
                </p>

                <form class="register-form" action="#" method="post">
                    <input class="register-input text-12" type="text" placeholder="Họ" aria-label="Họ" required>
                    <input class="register-input text-12" type="text" placeholder="Tên" aria-label="Tên" required>
                    <input class="register-input text-12" type="text" placeholder="Tên đăng nhập" aria-label="Tên đăng nhập" required>
                    <input class="register-input text-12" type="tel" placeholder="Số điện thoại" aria-label="Số điện thoại" required>
                    <input class="register-input text-12" type="password" placeholder="Mật khẩu" aria-label="Mật khẩu" required>
                    <input class="register-input text-12" type="password" placeholder="Nhập lại mật khẩu" aria-label="Nhập lại mật khẩu" required>
                    <button class="register-submit text-12 text-medium" type="submit">ĐĂNG KÝ</button>
                </form>
            </div>
        </section>
    </main>
    <div id="footer"></div>
    <script src="./reuse_header_footer.js"></script>
</body>
</html>
