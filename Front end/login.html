<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
    <link rel="stylesheet" href="./assets/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div id="header"></div>
    <main class="login-page">
        <section class="login-shell">
            <div class="login-card">
                <h1 class="login-title text-26 text-medium">ĐĂNG NHẬP</h1>
                <div class="login-title-divider" aria-hidden="true">
                    <span></span>
                </div>

                <form class="login-form" action="#" method="post">
                    <input class="login-input text-12" type="text" placeholder="Tên đăng nhập" aria-label="Tên đăng nhập" required>
                    <input class="login-input text-12" type="password" placeholder="Mật khẩu" aria-label="Mật khẩu" required>
                    <button class="login-submit text-12" type="submit">ĐĂNG NHẬP</button>
                </form>

                <div class="login-links text-14">
                    <a class="text-regular" href="#">Quên mật khẩu?</a>
                    <a class="text-regular" href="./register.html">Đăng ký</a>
                </div>
            </div>
        </section>
    </main>
    <div id="footer"></div>
    <script src="./reuse_header_footer.js"></script>
</body>
</html>
